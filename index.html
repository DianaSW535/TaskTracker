<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Трекер задач</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f4f6;
      color: #111827;
    }

    .app {
      width: min(520px, 92vw);
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    #task-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }

    #add-task-btn {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
      font-size: 14px;
    }

    #add-task-btn:hover {
      background: #1d4ed8;
    }

    #task-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
    }

    .task-text {
      flex: 1;
      word-break: break-word;
    }

    .delete-btn {
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      background: #ef4444;
      color: #ffffff;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .hint {
      margin: 8px 0 0;
      font-size: 12px;
      color: #6b7280;
    }

    .history {
      margin-top: 16px;
      border-top: 1px solid #e5e7eb;
      padding-top: 12px;
    }

    .history label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #374151;
    }

    #completed-history {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Трекер задач</h1>
    <div class="controls">
      <input id="task-input" type="text" placeholder="Введите новую задачу" />
      <button id="add-task-btn" type="button">Добавить</button>
    </div>
    <ul id="task-list"></ul>
    <p class="hint">Пустые задачи добавить нельзя.</p>
    <div class="history">
      <label for="completed-history">История выполненных задач</label>
      <select id="completed-history">
        <option value="">Пока нет выполненных задач</option>
      </select>
    </div>
  </main>

  <script>
    let tasks = [{ text: "Task 1" }, { text: "Task 2" }, { text: "Task 3" }];

    const completedHistory = document.getElementById("completed-history");

    function escapeHtml(text) {
        const el = document.createElement("div");
        el.textContent = text;
        return el.innerHTML;
    }

    function addTaskToHistory(taskText) {
        const placeholder = completedHistory.querySelector('option[value=""]');
        if (placeholder) {
            placeholder.remove();
        }
        const option = document.createElement("option");
        option.value = taskText;
        option.textContent = taskText;
        completedHistory.appendChild(option);
    }

    function renderTasks() {
        const list = document.getElementById("task-list");
        list.innerHTML = tasks
            .map(
                (task, i) =>
                    `<li class="task-item" data-index="${i}">` +
                    `<input type="checkbox" aria-label="Отметить задачу как выполненную" onchange="completeTask(${i})" />` +
                    `<span class="task-text">${escapeHtml(task.text)}</span>` +
                    `<button type="button" class="delete-btn" onclick="deleteTask(${i})">Удалить</button></li>`
            )
            .join("");
    }

    function completeTask(index) {
        const task = tasks[index];
        if (!task) {
            return;
        }
        addTaskToHistory(task.text);
        tasks.splice(index, 1);
        renderTasks();
    }

    function addTask() {
        const input = document.getElementById("task-input");
        if(input.value.trim() !== "") {
            tasks.push({ text: input.value.trim() });
            input.value = "";
            renderTasks();
        }
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        renderTasks();
    }

    document.getElementById("add-task-btn").addEventListener("click", addTask);
    document.getElementById("task-input").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            addTask();
        }
    });

    renderTasks();
</script>
</body>
</html>
